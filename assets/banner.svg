<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>

    <!-- Space background -->
    <linearGradient id="spaceBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#030510"/>
      <stop offset="45%"  stop-color="#08102a"/>
      <stop offset="100%" stop-color="#020408"/>
    </linearGradient>

    <!-- Nebula glow clouds -->
    <radialGradient id="neb1" cx="18%" cy="52%" r="48%">
      <stop offset="0%"   stop-color="#182a99" stop-opacity="0.38"/>
      <stop offset="55%"  stop-color="#091a5e" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#030510" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="78%" cy="38%" r="42%">
      <stop offset="0%"   stop-color="#0d506e" stop-opacity="0.26"/>
      <stop offset="65%"  stop-color="#042a4c" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#030510" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb3" cx="52%" cy="72%" r="32%">
      <stop offset="0%"   stop-color="#2e1b6e" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#030510" stop-opacity="0"/>
    </radialGradient>

    <!-- Delta fill gradient (gold) -->
    <linearGradient id="deltaFill" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%"   stop-color="#ffe566"/>
      <stop offset="45%"  stop-color="#ffc107"/>
      <stop offset="100%" stop-color="#e07800"/>
    </linearGradient>

    <!-- Delta ambient halo -->
    <radialGradient id="deltaHalo" cx="50%" cy="48%" r="50%">
      <stop offset="0%"   stop-color="#ffc107" stop-opacity="0.42"/>
      <stop offset="55%"  stop-color="#ffc107" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffc107" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow filter — delta -->
    <filter id="dGlow" x="-40%" y="-25%" width="180%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter — main title -->
    <filter id="tGlow" x="-8%" y="-40%" width="116%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ═══════════════════ BACKGROUND ═══════════════════ -->
  <rect width="1200" height="400" fill="url(#spaceBg)"/>
  <rect width="1200" height="400" fill="url(#neb1)"/>
  <rect width="1200" height="400" fill="url(#neb2)"/>
  <rect width="1200" height="400" fill="url(#neb3)"/>

