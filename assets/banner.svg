  <!-- ═══════════════════ DELTA SYMBOL ═══════════════════ -->

  <!-- Ambient halo behind delta -->
  <ellipse cx="170" cy="205" rx="108" ry="128" fill="url(#deltaHalo)"/>

  <!-- Shadow layer (offset, dark) -->
  <path d="M 173,79 L 259,330 L 173,277 L 89,330 Z"
        fill="#7a4000" opacity="0.28" transform="translate(4,5)"/>

  <!-- Main delta (gold, glowing) -->
  <path d="M 170,75 L 256,328 L 170,274 L 86,328 Z"
        fill="url(#deltaFill)" filter="url(#dGlow)"/>

  <!-- Shadow face — left half toned darker for depth -->
  <path d="M 170,75 L 170,274 L 86,328 Z"
        fill="#a85c00" opacity="0.30"/>

  <!-- Highlight face — right half slightly lighter -->
  <path d="M 170,75 L 256,328 L 170,274 Z"
        fill="#fff5cc" opacity="0.10"/>

  <!-- Center groove line -->
  <line x1="170" y1="88" x2="170" y2="272"
        stroke="#7a4000" stroke-width="1.5" opacity="0.45"/>

